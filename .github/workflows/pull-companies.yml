name: Pull Companies

on:
  workflow_dispatch:
    inputs:
      companies:
        description: 'Comma-separated LinkedIn slugs or URLs'
        required: true
        type: string

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull companies from Bright Data
        env:
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
          DATABASE_PATH: ./cre_intel.db
        run: |
          IFS=',' read -ra SLUGS <<< "${{ inputs.companies }}"
          python manage.py pull "${SLUGS[@]}"

      - name: Export data
        env:
          DATABASE_PATH: ./cre_intel.db
        run: python scripts/export_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: pull new companies $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
